services:
  db:
    image: mysql:8.0
    container_name: lockin_db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lockin_db}
      MYSQL_USER: ${MYSQL_USER:-lockin_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lockin_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: lockin_backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-lockin_db}?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-lockin_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-lockin_pass}
      AI_GAME_MASTER_URL: http://ai_sandbox:8000/api/adventure
    depends_on:
      db:
        condition: service_healthy
      ai_sandbox:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: lockin_frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:8081
    depends_on:
      - backend
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lockin_phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-lockin_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-lockin_pass}
    depends_on:
      db:
        condition: service_healthy

  ai_sandbox:
    build: ./python_ai_sandbox
    container_name: lockin_ai_sandbox
    ports:
      - "8000:8000"
    env_file:
      - ./python_ai_sandbox/.env

volumes:
  db_data:

networks:
  default:
    name: lockin_network
