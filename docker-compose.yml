version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: lockin-db
    restart: always
    environment:
      MYSQL_DATABASE: lockin_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
