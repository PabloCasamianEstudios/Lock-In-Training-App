# Database connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lockin_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Server configuration
server.port=${PORT:8081}

# Optimización de arranque para Render
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=deferred

logging.level.org.springframework.security=DEBUG
